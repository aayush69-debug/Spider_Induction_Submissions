

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: cr45
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"


  backend:
    build: ./backend
    environment:
      - HTTP_ADDR=:8080

      - DATABASE_URL=postgres://postgres:supersecretpassword@db:5432/cr45?sslmode=disable
      - APP_SECRET=production_secret_key
    ports:
      - "8080:8080"
    depends_on:
      - db


  frontend:
    build: ./frontend
    ports:
      - "3000:80" 
    depends_on:
      - backend


volumes:
  pgdata: