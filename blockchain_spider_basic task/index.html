<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Man's Switch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .panel { background: #1e1e1e; padding: 20px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; }
        h2 { color: #bb86fc; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        button { background-color: #bb86fc; color: #000; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #9965f4; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        input { width: calc(100% - 22px); padding: 10px; margin-top: 5px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #444; background: #2c2c2c; color: white; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.9em; margin-bottom: 15px; }
        .active { background: #03dac6; color: #000; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🕸️ Dead Man's Switch Vault</h1>
    <button id="connectWalletBtn">Connect MetaMask</button>
    <p>Connected: <span id="walletAddress">Not connected</span></p>

    <div class="panel" id="factoryPanel">
        <h2>1. Factory Panel</h2>
        <p>Deploy a new Dead Man's Switch contract.</p>
        <label>Check-in Interval (Seconds):</label>
        <input type="number" id="intervalInput" value="3600">
        <label>Grace Period (Seconds):</label>
        <input type="number" id="graceInput" value="1800">
        <button id="deployBtn">Deploy New Switch</button>
        
        <h3 style="margin-top: 20px;">Your Switches</h3>
        <button id="loadSwitchesBtn">Load My Switches</button>
        <ul id="switchList"></ul>
    </div>

    <div class="panel" id="ownerPanel">
        <h2>2. Owner Panel</h2>
        <label>Load Contract Address:</label>
        <input type="text" id="ownerContractAddress" placeholder="0x...">
        <button id="loadOwnerBtn">Load Dashboard</button>

        <div id="ownerDashboard" class="hidden" style="margin-top: 20px;">
            <div class="status-badge active" id="contractStatus">Status: Active</div>
            
            <button id="checkInBtn" style="background-color: #03dac6;">Check In (Reset Timer)</button>
            <br><br>

            <label>Add Beneficiary (Address | Share %):</label>
            <input type="text" id="benAddress" placeholder="0x...">
            <input type="number" id="benShare" placeholder="Share % (e.g. 50)">
            <button id="addBenBtn">Add Beneficiary</button>

            <br><br>
            <button id="cancelBtn" style="background-color: #cf6679; color: white;">Cancel & Withdraw All</button>
        </div>
    </div>

    <div class="panel" id="beneficiaryPanel">
        <h2>3. Beneficiary Panel</h2>
        <label>Lookup Contract Address:</label>
        <input type="text" id="benContractAddress" placeholder="0x...">
        <button id="loadBenBtn">Check Claim Status</button>

        <div id="benDashboard" class="hidden" style="margin-top: 20px;">
            <button id="claimBtn" disabled>Claim Funds</button>
        </div>
    </div>
</div>

<script>
    // Your exact deployed Factory Address
    const FACTORY_ADDRESS = "0x5FbDB2315678afecb367f032d93F642f64180aa3"; 

    const FACTORY_ABI = [
        "function createSwitch(uint256 checkInInterval, uint256 gracePeriod) external returns (address)",
        "function getSwitchesByOwner(address owner) external view returns (address[])"
    ];

    const SWITCH_ABI = [
        "function status() view returns (uint8)",
        "function checkIn() external",
        "function claim() external",
        "function cancel() external",
        "function addBeneficiary(address wallet, uint256 share) external"
    ];

    let provider, signer, userAddress;

    // v5 Connection Logic
    document.getElementById('connectWalletBtn').addEventListener('click', async () => {
        if (!window.ethereum) return alert("Please install MetaMask!");
        try {
            // Force MetaMask to wake up and ask for permission
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            // v5 syntax
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            userAddress = await signer.getAddress();
            
            document.getElementById('walletAddress').innerText = userAddress;
            document.getElementById('connectWalletBtn').innerText = "Connected";
        } catch (err) { 
            console.error(err); 
            alert("Failed to connect wallet."); 
        }
    });

    // Factory Deploy Logic
    document.getElementById('deployBtn').addEventListener('click', async () => {
        if (!signer) return alert("Connect wallet first!");
        try {
            const factory = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, signer);
            const interval = document.getElementById('intervalInput').value;
            const grace = document.getElementById('graceInput').value;
            
            const tx = await factory.createSwitch(interval, grace);
            await tx.wait(); 
            alert("Switch deployed successfully!");
        } catch (err) { console.error(err); alert("Deployment failed."); }
    });

    // Factory Load Logic
    document.getElementById('loadSwitchesBtn').addEventListener('click', async () => {
        if (!signer) return alert("Connect wallet first!");
        const factory = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, provider);
        const switches = await factory.getSwitchesByOwner(userAddress);
        
        const list = document.getElementById('switchList');
        list.innerHTML = "";
        switches.forEach(addr => {
            let li = document.createElement('li');
            li.innerText = addr;
            list.appendChild(li);
        });
    });
</script>

</body>
</html>
